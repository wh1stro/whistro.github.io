<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>whistro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: #000000; /* deep black space */
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: transparent;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.7;
      animation: twinkle 4s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.7); }
      100% { opacity: 0.9; transform: scale(1.1); }
    }

    .card {
      position: relative;
      width: 340px;
      padding: 2.5rem 2rem;
      background: rgba(15, 15, 25, 0.75);
      border-radius: 28px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 100, 120, 0.3);
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      text-align: center;
      z-index: 10;
    }

    .pfp-container {
      position: relative;
      margin: 0 auto 1.5rem;
      width: 130px;
      height: 130px;
    }
    .pfp {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(180, 180, 255, 0.4);
      box-shadow: 0 0 25px rgba(140, 140, 255, 0.5);
    }

    .name {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(90deg, #c4b5fd, #a5b4fc, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      text-shadow: 0 0 15px rgba(165, 180, 252, 0.6);
      letter-spacing: 1px;
    }

    .bio {
      opacity: 0.85;
      font-size: 1.1rem;
      margin: 1.2rem 0;
      line-height: 1.5;
    }

    /* Social icons - always shiny/glowing */
    .icons {
      display: flex;
      justify-content: center;
      gap: 2.5rem;
      margin-top: 1.8rem;
    }
    .icon-link {
      font-size: 2.2rem;
      color: #d1d5db;
      text-shadow: 
        0 0 10px rgba(255,255,255,0.6),
        0 0 20px rgba(165, 180, 252, 0.8),
        0 0 30px rgba(165, 180, 252, 0.5);
      transition: transform 0.3s;
    }
    .icon-link:hover {
      transform: scale(1.2);
    }

    /* Shooting stars */
    .shooting-star {
      position: absolute;
      width: 3px;
      height: 80px;
      background: linear-gradient(transparent, rgba(255,255,255,0.8), transparent);
      opacity: 0;
      animation: shoot 10s infinite linear;
      transform: rotate(30deg);
    }
    @keyframes shoot {
      0% { transform: translateX(-150vw) translateY(-150vh) rotate(30deg); opacity: 0; }
      5% { opacity: 0.9; }
      20% { opacity: 0; }
      100% { transform: translateX(150vw) translateY(150vh) rotate(30deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="pfp-container">
      <img class="pfp" src="https://example.com/your-pfp.png" alt="whistro" />
    </div>

    <div class="name">whistro</div>

    <div class="bio">sleeping</div>

    <div class="icons">
      <a href="https://www.youtube.com/@lovetowhis" class="icon-link" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://in.pinterest.com/whistro/" class="icon-link" target="_blank"><i class="fab fa-pinterest"></i></a>
      <a href="https://open.spotify.com/user/31qnp25zsexa4eghdzdqfcvyqcqm" class="icon-link" target="_blank"><i class="fab fa-spotify"></i></a>
      <a href="https://github.com/wh1stro" class="icon-link" target="_blank"><i class="fab fa-github"></i></a>
    </div>
  </div>

  <div class="shooting-star" style="top:15%; left:-20%; animation-delay:0s;"></div>
  <div class="shooting-star" style="top:45%; left:-30%; animation-delay:4s;"></div>
  <div class="shooting-star" style="top:70%; left:-10%; animation-delay:7s;"></div>

  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 2.5 + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 6 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
