<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>whistro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: #000000;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: transparent;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 5s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.6); }
      100% { opacity: 0.8; transform: scale(1.1); }
    }
    .card {
      position: relative;
      width: 340px;
      padding: 2.5rem 2rem;
      background: #0a0a0a;
      border-radius: 28px;
      border: 1px solid #222222;
      box-shadow: 0 10px 50px #000000;
      text-align: center;
      z-index: 10;
    }
    .pfp-container {
      position: relative;
      margin: 0 auto 1.5rem;
      width: 130px;
      height: 130px;
    }
    .pfp {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #333333;
      box-shadow: 0 0 30px #111111;
    }
    .name {
      font-size: 2.5rem;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 1rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
      letter-spacing: 1.5px;
    }
    .bio {
      color: #dddddd;
      font-size: 1.1rem;
      margin: 1.2rem 0;
      line-height: 1.6;
    }
    .icons {
      display: flex;
      justify-content: center;
      gap: 2.8rem;
      margin-top: 2rem;
    }
    .icon-link {
      font-size: 2.3rem;
      color: #cccccc;
      text-shadow: 
        0 0 12px rgba(255,255,255,0.6),
        0 0 24px rgba(255,255,255,0.4),
        0 0 36px rgba(255,255,255,0.2);
      transition: transform 0.3s;
    }
    .icon-link:hover {
      transform: scale(1.25);
    }
    .shooting-star {
      position: absolute;
      width: 3px;
      height: 90px;
      background: linear-gradient(transparent, rgba(255,255,255,0.8), transparent);
      opacity: 0;
      animation: shoot 12s infinite linear;
      transform: rotate(35deg);
    }
    @keyframes shoot {
      0% { transform: translateX(-150vw) translateY(-150vh) rotate(35deg); opacity: 0; }
      5% { opacity: 0.9; }
      25% { opacity: 0; }
      100% { transform: translateX(150vw) translateY(150vh) rotate(35deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="pfp-container">
      <img class="pfp" src="https://example.com/your-pfp.png" alt="whistro" />
    </div>

    <div class="name">whistro</div>

    <div class="bio"> Sleeping </div>

    <div class="icons">
      <a href="https://www.youtube.com/@lovetowhis" class="icon-link" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://in.pinterest.com/whistro/" class="icon-link" target="_blank"><i class="fab fa-pinterest"></i></a>
      <a href="https://open.spotify.com/user/31qnp25zsexa4eghdzdqfcvyqcqm" class="icon-link" target="_blank"><i class="fab fa-spotify"></i></a>
      <a href="https://github.com/wh1stro" class="icon-link" target="_blank"><i class="fab fa-github"></i></a>
    </div>
  </div>

  <div class="shooting-star" style="top:10%; left:-25%; animation-delay:0s;"></div>
  <div class="shooting-star" style="top:35%; left:-15%; animation-delay:3s;"></div>
  <div class="shooting-star" style="top:65%; left:-30%; animation-delay:6s;"></div>

  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 140; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 3 + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 8 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
