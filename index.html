<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>whistro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: #000000;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: transparent;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: #ffffff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 5s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.3; transform: scale(0.6); }
      100% { opacity: 0.8; transform: scale(1.1); }
    }
    .card {
      position: relative;
      width: 580px;
      height: 220px;
      padding: 1.8rem 2.5rem;
      background: #0a0a0a;
      border-radius: 16px;
      border: 1px solid #222222;
      box-shadow: 0 10px 50px #000000;
      text-align: center;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }
    .left {
      flex: 0 0 auto;
    }
    .pfp-container {
      width: 140px;
      height: 140px;
    }
    .pfp {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #333333;
      box-shadow: 0 0 30px #111111;
    }
    .right {
      flex: 1;
      text-align: left;
    }
    .name {
      font-size: 2.8rem;
      font-weight: 900;
      color: #ffffff;
      margin-bottom: 0.8rem;
      text-shadow: 0 0 20px rgba(255,255,255,0.4);
    }
    .bio {
      color: #dddddd;
      font-size: 1.4rem;
      line-height: 1.4;
    }
    .icons {
      display: flex;
      gap: 1.1rem;
      margin-top: 1.2rem;
    }
    .icon-link {
      font-size: 2.4rem;
      color: #cccccc;
      text-shadow: 
        0 0 12px rgba(255,255,255,0.6),
        0 0 24px rgba(255,255,255,0.4),
        0 0 36px rgba(255,255,255,0.2);
      transition: transform 0.3s;
    }
    .icon-link:hover {
      transform: scale(1.25);
    }
    .shooting-star {
      position: absolute;
      width: 3px;
      height: 90px;
      background: linear-gradient(transparent, rgba(255,255,255,0.8), transparent);
      opacity: 0;
      animation: shoot 12s infinite linear;
      transform: rotate(35deg);
    }
    @keyframes shoot {
      0% { transform: translateX(-150vw) translateY(-150vh) rotate(35deg); opacity: 0; }
      5% { opacity: 0.9; }
      25% { opacity: 0; }
      100% { transform: translateX(150vw) translateY(150vh) rotate(35deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="left">
      <div class="pfp-container">
        <img class="pfp" src="https://images-ext-1.discordapp.net/external/MjiVws4fOTPDi9tLHjBlxnMH5f9uiRdVcC7johdFrO0/%3Fsize%3D4096/https/cdn.discordapp.com/avatars/1238660217034768470/1ee91cf53af9a0d8f7620c827047d341.png?format=webp&quality=lossless&width=561&height=561" alt="whistro" />
      </div>
    </div>

    <div class="right">
      <div class="name">whistro</div>
      <div class="bio">sleeping</div>

      <div class="icons">
        <a href="https://www.youtube.com/@lovetowhis" class="icon-link" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://in.pinterest.com/whistro/" class="icon-link" target="_blank"><i class="fab fa-pinterest"></i></a>
        <a href="https://open.spotify.com/user/31qnp25zsexa4eghdzdqfcvyqcqm" class="icon-link" target="_blank"><i class="fab fa-spotify"></i></a>
        <a href="https://github.com/wh1stro" class="icon-link" target="_blank"><i class="fab fa-github"></i></a>
      </div>
    </div>
  </div>

  <div class="shooting-star" style="top:10%; left:-25%; animation-delay:0s;"></div>
  <div class="shooting-star" style="top:35%; left:-15%; animation-delay:3s;"></div>
  <div class="shooting-star" style="top:65%; left:-30%; animation-delay:6s;"></div>

  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 140; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 3 + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 8 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
