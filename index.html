<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>whistro</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: radial-gradient(ellipse at bottom, #0b001f 0%, #000 100%);
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .stars {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: transparent;
      pointer-events: none;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle {
      0% { opacity: 0.4; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.2); }
    }

    
    .card {
      position: relative;
      width: 320px;
      padding: 2rem 1.5rem;
      background: rgba(20, 20, 50, 0.6);
      border-radius: 1.5rem;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      text-align: center;
      z-index: 10;
      overflow: hidden;
    }

    .pfp-container {
      position: relative;
      margin: 0 auto 1rem;
      width: 120px;
      height: 120px;
    }
    .pfp {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(100, 200, 255, 0.8);
      box-shadow: 0 0 20px rgba(100, 200, 255, 0.6);
    }

    .name {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 10px rgba(167,139,250,0.5);
    }

    .status-box {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(0,0,0,0.4);
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      margin: 1rem 0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .status-dot {
      width: 12px;
      height: 12px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 10px #22c55e;
    }
    .status-text {
      font-size: 1rem;
      opacity: 0.9;
    }

    .icons {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .icon-link {
      font-size: 1.8rem;
      color: rgba(255,255,255,0.7);
      transition: all 0.3s;
    }
    .icon-link:hover {
      color: white;
      transform: scale(1.2);
      text-shadow: 0 0 15px white;
    }

    
    .shooting-star {
      position: absolute;
      width: 2px;
      height: 60px;
      background: linear-gradient(transparent, white, transparent);
      opacity: 0;
      animation: shoot 8s infinite;
      transform: rotate(45deg);
    }
    @keyframes shoot {
      0% { transform: translateX(-100vw) translateY(-100vh) rotate(45deg); opacity: 0; }
      10% { opacity: 0.8; }
      30% { opacity: 0; }
      100% { transform: translateX(100vw) translateY(100vh) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="card">
    <div class="pfp-container">
      
      <img class="pfp" src="" alt="pfp" />
    </div>

    <div class="name">whistro</div>

    <div class="status-box">
      <div class="status-dot"></div>
      <span class="status-text">sleeping</span>
    </div>

    
    <p style="opacity:0.8; margin:1rem 0; font-size:1.1rem;">
      I make things      
    </p>

    <div class="icons">
      <a href="https://www.youtube.com/@lovetowhis" class="icon-link"><i class="fab fa-youtube"></i></a>
      <a href="https://in.pinterest.com/whistro/" class="icon-link"><i class="fab fa-pinterest"></i></a>
      <a href="https://open.spotify.com/user/31qnp25zsexa4eghdzdqfcvyqcqm" class="icon-link"><i class="fab fa-spotify"></i></a>
    </div>
  </div>

 
  <div class="shooting-star" style="top:10%; left:-10%; animation-delay:0s;"></div>
  <div class="shooting-star" style="top:40%; left:-20%; animation-delay:3s;"></div>

  <script>
    =
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 3 + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 5 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
